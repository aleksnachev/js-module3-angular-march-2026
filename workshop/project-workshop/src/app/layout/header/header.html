<header>
  <div class="mini-navbar-wrap">
    <div class="logo-wrap">
      <img src="/project-workshop/public/images/logo.png" />
      <p class="logo">SoftUni Forum</p>
    </div>
    <div class="mini-navbar">
      @if (!isLoggedIn()) {
        <ul>
          <li>
            <a routerLink="/login">Login</a>
          </li>
          <li>
            <a routerLink="/register">Register</a>
          </li>
        </ul>
      } @else {
        <ul>
          <li>
            <a routerLink="/profile">{{ username() }}'s profile</a>
          </li>
        </ul>
        <ul>
          <li>
            <a (click)="onLogout()">Logout</a>
          </li>
        </ul>
      }
    </div>
  </div>
  <nav>
    <ul>
      <li>
        <a routerLink="/home">Home</a>
      </li>
      <li>
        <a routerLink="/themes">Themes</a>
      </li>
      <li>
        <a routerLink="/add-theme">New Theme</a>
      </li>
    </ul>
  </nav>
</header>
