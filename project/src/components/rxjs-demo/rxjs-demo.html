<div class="rxjs-demo">
  <h3>Rx JS Demo</h3>

  <div class="buttons">
    <button (click)="demo1()">1. of() + subscribe()</button>
    <button (click)="demo2()">2. pipe() + map() + filter()</button>
    <button (click)="demo3()">3.tap()</button>
    
    <button (click)="clearResults()">Clear</button>
  </div>
   
  <div class="results">
    @if (results.length === 0) {
        <p class="empty">Click one of the  buttons to see the details</p>
    }
    @for (r of results; track $index) {
        <div class="result">{{r}}</div>
    }
  </div>
</div>
